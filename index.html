<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villisika-Sepon juomapeli</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="appShell">
    <aside class="leftNav">
      <h2>🍺 Seppo</h2>
      <button id="guideButton" class="guideButton" type="button">📖 Peliopas</button>
      <div class="navDivider"></div>

      <div class="navGroup navGroupDaily activeNavGroup">
        <div class="navGroupTitle">1. Arki</div>
        <button data-target="mainContent">Peli</button>
        <button data-target="stressContent">Stressi</button>
        <button data-target="collapseContent">Romahdus</button>
        <button data-target="timeContent">Aika</button>
        <button data-target="eventContent">Tapahtumat</button>
        <button data-target="statsPanel">Pikatilastot</button>
      </div>

      <div class="navGroup navGroupMoney">
        <div class="navGroupTitle">2. Raha & ostokset</div>
        <button data-target="economyContent">Talous</button>
        <button data-target="beerShopContent">Olutkauppa</button>
        <button data-target="marketContent">Supermarket</button>
        <button data-target="moneyContent">Palautukset</button>
        <button data-target="jobsContent">Pikkukeikat</button>
        <button data-target="kelaContent">Kela</button>
      </div>

      <div class="navGroup navGroupProgress">
        <div class="navGroupTitle">3. Apurit & kehitys</div>
        <button data-target="helpersContent">Apurit</button>
        <button data-target="upgradesContent">Pysyvät parannukset</button>
      </div>

      <div class="navGroup navGroupGambling">
        <div class="navGroupTitle">4. Uhkapelit</div>
        <button data-target="gamblingContent">Uhkapelit</button>
      </div>

      <div class="navGroup navGroupAccount">
        <div class="navGroupTitle">5. Tili</div>
        <button data-target="accountContent">Tili ja tallennus</button>
      </div>
    </aside>

    <div class="pageWrap">
      <h1>🍺 Villisika-Sepon juomapeli 🍺</h1>

      <nav class="topSiteNav" aria-label="Pelin pääsivut">
        <button id="siteButtonDaily" class="active" type="button" onclick="UI.showSite('daily')">1. Arki</button>
        <button id="siteButtonMoney" type="button" onclick="UI.showSite('money')">2. Raha & ostokset</button>
        <button id="siteButtonProgress" type="button" onclick="UI.showSite('progress')">3. Apurit & kehitys</button>
        <button id="siteButtonGambling" type="button" onclick="UI.showSite('gambling')">4. Uhkapelit</button>
        <button id="siteButtonAccount" type="button" onclick="UI.showSite('account')">5. Tili</button>
      </nav>

      <section id="site-daily" class="sitePanel activeSite">
        <div class="layout">
          <main id="dailyMain"></main>
          <aside id="statsPanel" class="box"></aside>
        </div>
      </section>

      <section id="site-money" class="sitePanel hiddenSite">
        <main id="moneyMain" class="siteSingleColumn"></main>
      </section>

      <section id="site-progress" class="sitePanel hiddenSite">
        <main id="progressMain" class="siteSingleColumn"></main>
      </section>

      <section id="site-gambling" class="sitePanel hiddenSite">
        <main id="gamblingMain" class="siteSingleColumn"></main>
      </section>

      <section id="site-account" class="sitePanel hiddenSite">
        <main id="accountMain" class="siteSingleColumn"></main>
      </section>

      <footer>Villisika-Sepon juomapeli — versio 0.4.17-opasjajarjestys</footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modules/player.js"></script>
  <script src="js/modules/stress.js"></script>
  <script src="js/modules/collapse.js"></script>
  <script src="js/modules/time.js"></script>
  <script src="js/modules/economy.js"></script>
  <script src="js/modules/beer-shop.js"></script>
  <script src="js/modules/supermarket.js"></script>
  <script src="js/modules/events.js"></script>
  <script src="js/modules/helpers.js"></script>
  <script src="js/modules/returns.js"></script>
  <script src="js/modules/jobs.js"></script>
  <script src="js/modules/kela.js"></script>
  <script src="js/modules/upgrades.js"></script>
  <script src="js/modules/gambling.js"></script>
  <script src="js/modules/account.js"></script>
  <script src="js/modules/save.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
